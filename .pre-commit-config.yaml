repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Lint (ruff)
        entry: ruff check services/ tests/
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: black-check
        name: Format (black)
        entry: black --check services/ tests/
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: unit-tests
        name: Unit tests (pytest)
        entry: pytest tests/ -m unit -q --no-header --tb=line
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: dependency-scan
        name: Scan dependencies for vulnerabilities
        entry: scripts/pre-commit-scan.sh
        language: script
        pass_filenames: false
        stages: [pre-commit]
