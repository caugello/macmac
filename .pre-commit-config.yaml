repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Lint (ruff)
        entry: uv run ruff check services/ tests/
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: black-check
        name: Format (black)
        entry: uv run black --check services/ tests/
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: unit-tests
        name: Unit tests (pytest)
        entry: uv run pytest tests/ -m unit -q --no-header --tb=line
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: dependency-scan
        name: Scan dependencies for vulnerabilities
        entry: scripts/pre-commit-scan.sh
        language: script
        pass_filenames: false
        stages: [pre-commit]
