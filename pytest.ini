[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Coverage settings
addopts =
    --verbose
    --strict-markers
    --cov=services
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml

# Test markers
markers =
    unit: Unit tests that don't require external dependencies
    integration: Integration tests that require database or message queue
    slow: Slow tests that take more than 1 second
