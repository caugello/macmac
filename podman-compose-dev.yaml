version: "3"
services:
  # Infrastructure Services
  redis:
    hostname: redis
    image: docker.io/library/redis:7-alpine
    ports:
      - 6379:6379
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-devpassword}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devpassword}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    hostname: rabbitmq
    image: docker.io/library/rabbitmq:4.1.6-management
    ports:
      - 5672:5672
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-macmac}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-devpassword}
    entrypoint: ["/bin/bash", "-c", "echo 'dev-cookie' > /var/lib/rabbitmq/.erlang.cookie && chmod 400 /var/lib/rabbitmq/.erlang.cookie && exec docker-entrypoint.sh rabbitmq-server"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  recipes_db:
    hostname: recipes-db
    image: quay.io/fedora/postgresql-16
    environment:
      POSTGRESQL_USER: dbuser
      POSTGRESQL_PASSWORD: dbpass
      POSTGRESQL_DATABASE: recipes
      POSTGRESQL_ADMIN_PASSWORD: admin
    ports:
      - 5432:5432
    tmpfs:
      - /var/lib/pgsql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbuser -d recipes"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  catalog_db:
    hostname: catalog-db
    image: quay.io/fedora/postgresql-16
    environment:
      POSTGRESQL_USER: dbuser
      POSTGRESQL_PASSWORD: dbpass
      POSTGRESQL_DATABASE: catalog
      POSTGRESQL_ADMIN_PASSWORD: admin
    ports:
      - 5433:5432
    tmpfs:
      - /var/lib/pgsql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbuser -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # Migration services
  recipes_migration:
    build:
      context: .
      dockerfile: Containerfile
      target: recipes
    image: quay.io/caugello/macmac-recipes:dev
    working_dir: /opt/app-root/src
    volumes:
      - .:/opt/app-root/src
    environment:
      PYTHONPATH: /opt/app-root/src
      ENVIRONMENT: "development"
      RECIPES_DATABASE_URL: "postgresql+psycopg2://dbuser:dbpass@recipes-db:5432/recipes"
    command: sh -c "until python -c 'import psycopg2; psycopg2.connect(\"host=recipes-db dbname=recipes user=dbuser password=dbpass\")' 2>/dev/null; do echo 'Waiting for recipes-db...'; sleep 2; done && alembic -c services/recipes/alembic.ini upgrade head"
    depends_on:
      recipes_db:
        condition: service_healthy
    restart: "no"

  catalog_migration:
    build:
      context: .
      dockerfile: Containerfile
      target: catalog
    image: quay.io/caugello/macmac-catalog:dev
    working_dir: /opt/app-root/src
    volumes:
      - .:/opt/app-root/src
    environment:
      PYTHONPATH: /opt/app-root/src
      ENVIRONMENT: "development"
      CATALOG_DATABASE_URL: "postgresql+psycopg2://dbuser:dbpass@catalog-db:5432/catalog"
    command: sh -c "until python -c 'import psycopg2; psycopg2.connect(\"host=catalog-db dbname=catalog user=dbuser password=dbpass\")' 2>/dev/null; do echo 'Waiting for catalog-db...'; sleep 2; done && alembic -c services/catalog/alembic.ini upgrade head"
    depends_on:
      catalog_db:
        condition: service_healthy
    restart: "no"

  meal_plans_db:
    hostname: meal-plans-db
    image: quay.io/fedora/postgresql-16
    environment:
      POSTGRESQL_USER: dbuser
      POSTGRESQL_PASSWORD: dbpass
      POSTGRESQL_DATABASE: meal_plans
      POSTGRESQL_ADMIN_PASSWORD: admin
    ports:
      - 5434:5432
    tmpfs:
      - /var/lib/pgsql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbuser -d meal_plans"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  meal_plans_migration:
    build:
      context: .
      dockerfile: Containerfile
      target: meal-plans
    image: quay.io/caugello/macmac-meal-plans:dev
    working_dir: /opt/app-root/src
    volumes:
      - .:/opt/app-root/src
    environment:
      PYTHONPATH: /opt/app-root/src
      ENVIRONMENT: "development"
      MEAL_PLANS_DATABASE_URL: "postgresql+psycopg2://dbuser:dbpass@meal-plans-db:5432/meal_plans"
    command: sh -c "until python -c 'import psycopg2; psycopg2.connect(\"host=meal-plans-db dbname=meal_plans user=dbuser password=dbpass\")' 2>/dev/null; do echo 'Waiting for meal-plans-db...'; sleep 2; done && alembic -c services/meal_plans/alembic.ini upgrade head"
    depends_on:
      meal_plans_db:
        condition: service_healthy
    restart: "no"

  auth_db:
    hostname: auth-db
    image: quay.io/fedora/postgresql-16
    environment:
      POSTGRESQL_USER: dbuser
      POSTGRESQL_PASSWORD: dbpass
      POSTGRESQL_DATABASE: auth
      POSTGRESQL_ADMIN_PASSWORD: admin
    ports:
      - 5435:5432
    tmpfs:
      - /var/lib/pgsql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbuser -d auth"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s


  auth_migration:
    build:
      context: .
      dockerfile: Containerfile
      target: auth
    image: quay.io/caugello/macmac-auth:dev
    working_dir: /opt/app-root/src
    volumes:
      - .:/opt/app-root/src
    environment:
      PYTHONPATH: /opt/app-root/src
      ENVIRONMENT: "development"
      AUTH_DATABASE_URL: "postgresql+psycopg2://dbuser:dbpass@auth-db:5432/auth"
    command: sh -c "until python -c 'import psycopg2; psycopg2.connect(\"host=auth-db dbname=auth user=dbuser password=dbpass\")' 2>/dev/null; do echo 'Waiting for auth-db...'; sleep 2; done && alembic -c services/auth/alembic.ini upgrade head"
    depends_on:
      auth_db:
        condition: service_healthy
    restart: "no"

  # API Services
  auth_api:
    hostname: auth-api
    build:
      context: .
      dockerfile: Containerfile
      target: auth
    image: quay.io/caugello/macmac-auth:dev
    working_dir: /opt/app-root/src
    volumes:
      - .:/opt/app-root/src
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/secrets/firebase-service-account.json:ro
    environment:
      PYTHONPATH: /opt/app-root/src
      ENVIRONMENT: "development"
      AUTH_DATABASE_URL: "postgresql+psycopg2://dbuser:dbpass@auth-db:5432/auth"
      JWT_SECRET_KEY: "dev-secret-key-change-in-production-min-32-chars"
      GOOGLE_APPLICATION_CREDENTIALS: "/secrets/firebase-service-account.json"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
    ports:
      - 8004:8004
    command: uvicorn services.auth.main:app --reload --reload-dir services --reload-dir config.yaml --host 0.0.0.0 --port 8004
    depends_on:
      redis:
        condition: service_healthy
      auth_migration:
        condition: service_completed_successfully

  gateway:
    hostname: gateway
    build:
      context: .
      dockerfile: Containerfile
      target: gateway
    image: quay.io/caugello/macmac-gateway:dev
    working_dir: /opt/app-root/src
    volumes:
      - .:/opt/app-root/src
    environment:
      PYTHONPATH: /opt/app-root/src
      ENVIRONMENT: "development"
      JWT_SECRET_KEY: "dev-secret-key-change-in-production-min-32-chars"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
    ports:
      - 8000:8000
    command: uvicorn services.gateway.main:app --reload --reload-dir services --reload-dir config.yaml --host 0.0.0.0 --port 8000
    depends_on:
      redis:
        condition: service_healthy
      recipes_api:
        condition: service_started
      catalog_api:
        condition: service_started
      meal_plans_api:
        condition: service_started
      auth_api:
        condition: service_started

  recipes_api:
    hostname: recipes-api
    build:
      context: .
      dockerfile: Containerfile
      target: recipes
    image: quay.io/caugello/macmac-recipes:dev
    working_dir: /opt/app-root/src
    volumes:
      - .:/opt/app-root/src
    environment:
      PYTHONPATH: /opt/app-root/src
      RECIPES_DATABASE_URL: "postgresql+psycopg2://dbuser:dbpass@recipes-db:5432/recipes"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
    ports:
      - 8001:8001
    command: uvicorn services.recipes.main:app --reload --reload-dir services --reload-dir config.yaml --host 0.0.0.0 --port 8001
    depends_on:
      redis:
        condition: service_healthy
      recipes_migration:
        condition: service_completed_successfully

  catalog_api:
    hostname: catalog-api
    build:
      context: .
      dockerfile: Containerfile
      target: catalog
    image: quay.io/caugello/macmac-catalog:dev
    working_dir: /opt/app-root/src
    volumes:
      - .:/opt/app-root/src
    environment:
      PYTHONPATH: /opt/app-root/src
      CATALOG_DATABASE_URL: "postgresql+psycopg2://dbuser:dbpass@catalog-db:5432/catalog"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
    ports:
      - 8002:8002
    command: uvicorn services.catalog.main:app --reload --reload-dir services --reload-dir config.yaml --host 0.0.0.0 --port 8002
    depends_on:
      redis:
        condition: service_healthy
      catalog_migration:
        condition: service_completed_successfully

  catalog_crawler:
    hostname: catalog-crawler
    profiles:
      - manual
    build:
      context: .
      dockerfile: Containerfile
      target: crawler
    image: quay.io/caugello/macmac-crawler:dev
    working_dir: /opt/app-root/src
    volumes:
      - .:/opt/app-root/src
    environment:
      PYTHONPATH: /opt/app-root/src
    command: python -m services.catalog.crawler.main
    depends_on:
      rabbitmq:
        condition: service_healthy

  catalog_enricher:
    hostname: catalog-enricher
    build:
      context: .
      dockerfile: Containerfile
      target: enricher
    image: quay.io/caugello/macmac-enricher:dev
    shm_size: '2gb'
    working_dir: /opt/app-root/src
    volumes:
      - .:/opt/app-root/src
    environment:
      PYTHONPATH: /opt/app-root/src
      ENVIRONMENT: "development"
      CATALOG_DATABASE_URL: "postgresql+psycopg2://dbuser:dbpass@catalog-db:5432/catalog"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      PLAYWRIGHT_BROWSERS_PATH: /opt/playwright-browsers
    command: python -m services.catalog.enricher.main
    depends_on:
      catalog_migration:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  meal_plans_api:
    hostname: meal-plans-api
    build:
      context: .
      dockerfile: Containerfile
      target: meal-plans
    image: quay.io/caugello/macmac-meal-plans:dev
    working_dir: /opt/app-root/src
    volumes:
      - .:/opt/app-root/src
    environment:
      PYTHONPATH: /opt/app-root/src
      MEAL_PLANS_DATABASE_URL: "postgresql+psycopg2://dbuser:dbpass@meal-plans-db:5432/meal_plans"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
    ports:
      - 8003:8003
    command: uvicorn services.meal_plans.main:app --reload --reload-dir services --reload-dir config.yaml --host 0.0.0.0 --port 8003
    depends_on:
      redis:
        condition: service_healthy
      meal_plans_migration:
        condition: service_completed_successfully
