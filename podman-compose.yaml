version: "3"
networks:
  macmac_gateway: {}
  macmac_catalog: {}
  macmac_recipes: {}
  macmac_meal_plans: {}
  macmac_cache: {}
  macmac_auth: {}
services:
  redis:
    hostname: redis
    image: docker.io/library/redis:7-alpine
    networks:
      - macmac_cache
    command: redis-server --appendonly yes

  gateway:
    hostname: gateway
    image: quay.io/caugello/macmac-base
    ports:
      - 8000:8000
    networks:
      - macmac_recipes
      - macmac_catalog
      - macmac_meal_plans
      - macmac_gateway
      - macmac_cache
    environment:
      REDIS_URL: "redis://redis:6379/0"
    command:
      - gunicorn
      - services.gateway.main:app
      - --workers=4
      - --worker-class=uvicorn.workers.UvicornWorker
      - --bind=0.0.0.0:8000
      - --access-logfile=-
      - --error-logfile=-
    volumes:
      - ./config.yaml:/app/config.yaml
    depends_on:
      - redis
      - auth_api

  keycloak:
    hostname: keycloak
    image: quay.io/keycloak/keycloak:26.1
    ports:
      - 8080:8080
    networks:
      - macmac_auth
      - macmac_gateway
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://auth-db:5432/keycloak
      KC_DB_USERNAME: dbuser
      KC_DB_PASSWORD: dbpass
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./openshift/keycloak-dev-realm.json:/opt/keycloak/data/import/macmac-dev-realm.json
    depends_on:
      - auth_db

  rabbitmq:
    hostname: rabbitmq
    image: docker.io/library/rabbitmq:4.1.6-management
    networks:
      - macmac_catalog
    # ports:
    #   - 5672:5672
    #   - 15672:15672
  recipes_db:
    hostname: recipes-db
    image: quay.io/fedora/postgresql-16
    ports:
      - "5432:5432"
    networks:
      - macmac_recipes
    environment:
      POSTGRESQL_USER: dbuser
      POSTGRESQL_PASSWORD: dbpass
      POSTGRESQL_DATABASE: recipes
      POSTGRESQL_ADMIN_PASSWORD: admin

  recipes_migrate:
    image: quay.io/caugello/macmac-base
    depends_on:
      - recipes_db
    networks:
      - macmac_recipes
    command:
      - sh
      - -lc
      - |
        sleep 30 && alembic -c services/recipes/alembic.ini upgrade head
  recipes_api:
    hostname: recipes-api
    image: quay.io/caugello/macmac-base
    # ports:
    #   - 8001:8001
    networks:
      - macmac_recipes
      - macmac_gateway
      - macmac_cache
    environment:
      REDIS_URL: "redis://redis:6379/0"
    command:
      - gunicorn
      - services.recipes.main:app
      - --workers=4
      - --worker-class=uvicorn.workers.UvicornWorker
      - --bind=0.0.0.0:8001
      - --access-logfile=-
      - --error-logfile=-
    depends_on:
      - redis
  catalog_db:
    hostname: catalog-db
    image: quay.io/fedora/postgresql-16
    networks:
      - macmac_catalog
    environment:
      POSTGRESQL_USER: dbuser
      POSTGRESQL_PASSWORD: dbpass
      POSTGRESQL_DATABASE: catalog
      POSTGRESQL_ADMIN_PASSWORD: admin

  catalog_migrate:
    image: quay.io/caugello/macmac-base
    depends_on:
      - catalog_db
    networks:
      - macmac_catalog
    command:
      - sh
      - -lc
      - |
        sleep 30 && alembic -c services/catalog/alembic.ini upgrade head
  catalog_api:
    hostname: catalog-api
    image: quay.io/caugello/macmac-base
    # ports:
    #   - 8002:8002
    networks:
      - macmac_catalog
      - macmac_gateway
      - macmac_cache
    environment:
      REDIS_URL: "redis://redis:6379/0"
    command:
      - gunicorn
      - services.catalog.main:app
      - --workers=4
      - --worker-class=uvicorn.workers.UvicornWorker
      - --bind=0.0.0.0:8002
      - --access-logfile=-
      - --error-logfile=-
    depends_on:
      - redis

  meal_plans_db:
    hostname: meal-plans-db
    image: quay.io/fedora/postgresql-16
    ports:
      - "5433:5432"
    networks:
      - macmac_meal_plans
    environment:
      POSTGRESQL_USER: dbuser
      POSTGRESQL_PASSWORD: dbpass
      POSTGRESQL_DATABASE: meal_plans
      POSTGRESQL_ADMIN_PASSWORD: admin

  meal_plans_migrate:
    image: quay.io/caugello/macmac-base
    depends_on:
      - meal_plans_db
    networks:
      - macmac_meal_plans
    command:
      - sh
      - -lc
      - |
        sleep 30 && alembic -c services/meal_plans/alembic.ini upgrade head

  meal_plans_api:
    hostname: meal-plans-api
    image: quay.io/caugello/macmac-base
    # ports:
    #   - 8003:8003
    networks:
      - macmac_meal_plans
      - macmac_gateway
      - macmac_recipes
      - macmac_catalog
      - macmac_cache
    environment:
      REDIS_URL: "redis://redis:6379/0"
    command:
      - gunicorn
      - services.meal_plans.main:app
      - --workers=4
      - --worker-class=uvicorn.workers.UvicornWorker
      - --bind=0.0.0.0:8003
      - --access-logfile=-
      - --error-logfile=-
    depends_on:
      - redis

  auth_db:
    hostname: auth-db
    image: quay.io/fedora/postgresql-16
    ports:
      - "5435:5432"
    networks:
      - macmac_auth
    environment:
      POSTGRESQL_USER: dbuser
      POSTGRESQL_PASSWORD: dbpass
      POSTGRESQL_DATABASE: auth
      POSTGRESQL_ADMIN_PASSWORD: admin

  keycloak_db:
    hostname: keycloak-db
    image: quay.io/fedora/postgresql-16
    networks:
      - macmac_auth
    environment:
      POSTGRESQL_USER: dbuser
      POSTGRESQL_PASSWORD: dbpass
      POSTGRESQL_DATABASE: keycloak
      POSTGRESQL_ADMIN_PASSWORD: admin

  auth_migrate:
    image: quay.io/caugello/macmac-base
    depends_on:
      - auth_db
    networks:
      - macmac_auth
    command:
      - sh
      - -lc
      - |
        sleep 30 && alembic -c services/auth/alembic.ini upgrade head

  auth_api:
    hostname: auth-api
    image: quay.io/caugello/macmac-base
    networks:
      - macmac_auth
      - macmac_gateway
      - macmac_cache
    environment:
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-dev-secret-change-in-production}"
      KEYCLOAK_URL: "http://keycloak:8080"
      KEYCLOAK_REALM: "macmac-dev"
      KEYCLOAK_CLIENT_ID: "macmac-api"
      KEYCLOAK_CLIENT_SECRET: "macmac-api-secret"
    command:
      - gunicorn
      - services.auth.main:app
      - --workers=4
      - --worker-class=uvicorn.workers.UvicornWorker
      - --bind=0.0.0.0:8004
      - --access-logfile=-
      - --error-logfile=-
    depends_on:
      - redis
      - keycloak

  frontend:
    hostname: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - 3000:80
    networks:
      - macmac_gateway
    depends_on:
      - gateway
    restart: unless-stopped
