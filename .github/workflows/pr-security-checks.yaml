name: PR Security Checks
on:
  pull_request:
    # Python deps are managed by uv: pyproject.toml (direct deps) + uv.lock
    # (pinned transitive set). Both are watched so any dependency change runs
    # this gate. CVE coverage for both comes from the vulnerability-scan job
    # below (Grype/Syft parse uv.lock + pyproject.toml); dependency-review
    # covers manifests in GitHub's dependency graph.
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "frontend/package*.json"
      - "Dockerfile"
      - "frontend/Dockerfile"
      - ".github/workflows/**"

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: critical
          comment-summary-in-pr: always

  vulnerability-scan:
    name: Scan dependencies for CVEs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Scan Python dependencies
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: grype-scan
        with:
          path: .
          fail-build: true
          severity-cutoff: high
          output-format: sarif
          config: .grype.yaml

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: ${{ steps.grype-scan.outputs.sarif }}
          category: pr-dependency-scan
