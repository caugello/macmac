name: Build and Push Images
on:
  workflow_run:
    workflows: ["Test and Lint"]
    types: [completed]
    branches: ["main"]
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build and push ${{ matrix.image }}
    runs-on: ubuntu-22.04
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    strategy:
      matrix:
        include:
          - image: macmac-gateway
            context: .
            containerfile: ./Containerfile
            target: gateway
          - image: macmac-recipes
            context: .
            containerfile: ./Containerfile
            target: recipes
          - image: macmac-catalog
            context: .
            containerfile: ./Containerfile
            target: catalog
          - image: macmac-meal-plans
            context: .
            containerfile: ./Containerfile
            target: meal-plans
          - image: macmac-auth
            context: .
            containerfile: ./Containerfile
            target: auth
          - image: macmac-enricher
            context: .
            containerfile: ./Containerfile
            target: enricher
          - image: macmac-crawler
            context: .
            containerfile: ./Containerfile
            target: crawler
          - image: macmac-frontend
            context: ./frontend
            containerfile: ./frontend/Containerfile
            target: ""

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Build Image
        id: build-image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          image: ${{ matrix.image }}
          tags: latest ${{ github.sha }} ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          context: ${{ matrix.context }}
          containerfiles: |
            ${{ matrix.containerfile }}
          extra-args: |
            --timestamp 0
            ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      - name: Cache Grype DB
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/grype
          key: grype-db-${{ runner.os }}-${{ hashFiles('**/Containerfile') }}
          restore-keys: grype-db-${{ runner.os }}-

      - name: Cache Trivy DB
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}
          restore-keys: trivy-db-

      - name: Scan with Grype
        id: grype-scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.build-image.outputs.image }}:${{ github.sha }}
          fail-build: true
          severity-cutoff: high
          output-format: sarif
          config: .grype.yaml

      - name: Upload Grype SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: ${{ steps.grype-scan.outputs.sarif }}
          category: grype-${{ matrix.image }}

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.build-image.outputs.image }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          timeout: 10m

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.image }}

      - name: Fail on Trivy findings
        run: |
          trivy_results=$(cat trivy-results.sarif | jq '.runs[0].results | length')
          if [ "$trivy_results" -gt 0 ]; then
            echo "Trivy found $trivy_results vulnerabilities"
            exit 1
          fi

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.build-image.outputs.image }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json
          config: .syft.yaml

      - name: Push To quay.io
        id: push-to-quay
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: quay.io/caugello
          username: caugello+macmac
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: quay.io/caugello/${{ matrix.image }}
          subject-digest: ${{ steps.push-to-quay.outputs.digest }}

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: quay.io/caugello/${{ matrix.image }}
          subject-digest: ${{ steps.push-to-quay.outputs.digest }}
          sbom-path: sbom.spdx.json

      - name: Sign Container Image
        run: |
          cosign login quay.io \
            -u caugello+macmac \
            -p "$REGISTRY_PASSWORD"
          cosign sign --yes \
            quay.io/caugello/${{ matrix.image }}@${{ steps.push-to-quay.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "1"
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Print image url
        run: echo "Image pushed to ${{ steps.push-to-quay.outputs.registry-paths }}"
