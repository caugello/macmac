name: Build and Push Images
on:
  workflow_run:
    workflows: ["Test and Lint"]
    types: [completed]
    branches: ["main"]
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    name: Build and push ${{ matrix.image }}
    runs-on: ubuntu-22.04
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    strategy:
      matrix:
        include:
          - image: macmac-gateway
            context: .
            containerfile: ./Containerfile
            target: gateway
          - image: macmac-recipes
            context: .
            containerfile: ./Containerfile
            target: recipes
          - image: macmac-catalog
            context: .
            containerfile: ./Containerfile
            target: catalog
          - image: macmac-meal-plans
            context: .
            containerfile: ./Containerfile
            target: meal-plans
          - image: macmac-auth
            context: .
            containerfile: ./Containerfile
            target: auth
          - image: macmac-enricher
            context: .
            containerfile: ./Containerfile
            target: enricher
          - image: macmac-crawler
            context: .
            containerfile: ./Containerfile
            target: crawler
          - image: macmac-frontend
            context: ./frontend
            containerfile: ./frontend/Dockerfile
            target: ""

    steps:
      - uses: actions/checkout@v4

      - name: Build Image
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ matrix.image }}
          tags: latest ${{ github.sha }} ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          context: ${{ matrix.context }}
          containerfiles: |
            ${{ matrix.containerfile }}
          extra-args: |
            ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      - name: Push To quay.io
        id: push-to-quay
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: quay.io/caugello
          username: caugello+macmac
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Print image url
        run: echo "Image pushed to ${{ steps.push-to-quay.outputs.registry-paths }}"
