name: Build and Push Images
on:
  workflow_run:
    workflows: ["Test and Lint"]
    types: [completed]
    branches: ["main"]
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build and push ${{ matrix.image }}
    runs-on: ubuntu-22.04
    # contents:write is needed by anchore/sbom-action to attach SBOMs to GitHub
    # releases on tag-triggered builds; scoped here so future jobs don't inherit it.
    permissions:
      contents: write
      security-events: write
      id-token: write
      attestations: write
    if: >
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    environment: production

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - image: macmac-gateway
            context: .
            containerfile: ./Dockerfile
            target: gateway
          - image: macmac-recipes
            context: .
            containerfile: ./Dockerfile
            target: recipes
          - image: macmac-catalog
            context: .
            containerfile: ./Dockerfile
            target: catalog
          - image: macmac-meal-plans
            context: .
            containerfile: ./Dockerfile
            target: meal-plans
          - image: macmac-auth
            context: .
            containerfile: ./Dockerfile
            target: auth
          - image: macmac-enricher
            context: .
            containerfile: ./Dockerfile
            target: enricher
          - image: macmac-crawler
            context: .
            containerfile: ./Dockerfile
            target: crawler
          - image: macmac-frontend
            context: ./frontend
            containerfile: ./frontend/Dockerfile
            target: ""

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install Conforma (ec)
        run: |
          curl -sLO https://github.com/conforma/cli/releases/download/v0.9.44/ec_linux_amd64
          sha256sum --check --strict .github/conforma-ec.sha256
          install ec_linux_amd64 /usr/local/bin/ec
          rm -f ec_linux_amd64
          ec version

      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify base image signatures
        run: bash scripts/verify-base-images.sh "${{ matrix.containerfile }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Write build secrets
        run: |
          printf '%s' "$UV_INDEX_RHTL_USERNAME" > /tmp/uv-rhtl-username
          printf '%s' "$UV_INDEX_RHTL_PASSWORD" > /tmp/uv-rhtl-password
        env:
          UV_INDEX_RHTL_USERNAME: ${{ secrets.UV_INDEX_RHTL_USERNAME }}
          UV_INDEX_RHTL_PASSWORD: ${{ secrets.UV_INDEX_RHTL_PASSWORD }}

      - name: Get cache rotation key
        id: cache-key
        run: echo "week=$(date +%Y-%U)" >> "$GITHUB_OUTPUT"

      - name: Build Image
        id: build-image
        uses: redhat-actions/buildah-build@061ffd31bb5c3f8733a6f9bbdf00a9fb02eb708c # main 2026-04-09, node24
        with:
          image: ${{ matrix.image }}
          tags: latest ${{ github.sha }} ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          context: ${{ matrix.context }}
          containerfiles: |
            ${{ matrix.containerfile }}
          extra-args: |
            --timestamp 0
            --secret id=UV_INDEX_RHTL_USERNAME,src=/tmp/uv-rhtl-username
            --secret id=UV_INDEX_RHTL_PASSWORD,src=/tmp/uv-rhtl-password
            ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      - name: Cache Grype DB
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/grype
          # "build" prefix scopes this cache to build-and-push.yaml only — no
          # other workflow writes to grype-db-build-* so PR runs cannot poison it.
          key: grype-db-build-${{ runner.os }}-${{ steps.cache-key.outputs.week }}
          restore-keys: grype-db-build-${{ runner.os }}-

      - name: Cache Trivy DB
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/trivy
          # "build" prefix scopes this cache to build-and-push.yaml only.
          key: trivy-db-build-${{ runner.os }}-${{ steps.cache-key.outputs.week }}
          restore-keys: trivy-db-build-

      - name: Scan with Grype
        id: grype-scan
        continue-on-error: true
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.build-image.outputs.image }}:${{ github.sha }}
          fail-build: false
          severity-cutoff: high
          output-format: sarif
          config: .grype.yaml

      - name: Retry Grype scan on transient failure
        id: grype-scan-retry
        if: steps.grype-scan.outcome == 'failure' && steps.grype-scan.outputs.sarif == ''
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.build-image.outputs.image }}:${{ github.sha }}
          fail-build: false
          severity-cutoff: high
          output-format: sarif
          config: .grype.yaml

      - name: Upload Grype SARIF
        if: always() && (steps.grype-scan.outputs.sarif != '' || steps.grype-scan-retry.outputs.sarif != '')
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: ${{ steps.grype-scan-retry.outputs.sarif || steps.grype-scan.outputs.sarif }}
          category: grype-${{ matrix.image }}

      - name: Scan with Trivy
        id: trivy-scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.build-image.outputs.image }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"
          trivy-config: .trivy.yaml
          trivyignores: .trivyignore
          timeout: 10m

      - name: Retry Trivy scan on transient failure
        id: trivy-scan-retry
        if: steps.trivy-scan.outcome == 'failure' && !hashFiles('trivy-results.sarif')
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.build-image.outputs.image }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"
          trivy-config: .trivy.yaml
          trivyignores: .trivyignore
          timeout: 10m

      - name: Fix Trivy SARIF URI scheme
        if: always()
        run: |
          if [ ! -f trivy-results.sarif ]; then exit 0; fi
          jq '(.runs[].results[].locations[].physicalLocation.artifactLocation.uri) |=
            if test(":") then "Dockerfile" else . end' \
            trivy-results.sarif > trivy-results-fixed.sarif
          mv trivy-results-fixed.sarif trivy-results.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.image }}

      - name: Verify scan outputs
        if: always()
        run: |
          missing=0
          grype_sarif="${{ steps.grype-scan-retry.outputs.sarif || steps.grype-scan.outputs.sarif }}"
          if [ -z "$grype_sarif" ] || [ ! -f "$grype_sarif" ]; then
            echo "::error::Grype scan did not produce SARIF output — job may have been cancelled or scanner failed"
            missing=1
          fi
          if [ ! -f trivy-results.sarif ]; then
            echo "::error::Trivy scan did not produce SARIF output — job may have been cancelled or scanner failed"
            missing=1
          fi
          [ "$missing" -eq 0 ]

      - name: Fail on scan findings
        run: |
          grype_sarif="${{ steps.grype-scan-retry.outputs.sarif || steps.grype-scan.outputs.sarif }}"
          # Filter Grype SARIF to level=="error" (HIGH+CRITICAL only).
          # Grype's SARIF carries ALL severities regardless of severity-cutoff;
          # level=="error" maps to HIGH and CRITICAL per the SARIF spec.
          grype_results=$(jq '[.runs[0].results[] | select(.level == "error")] | length' "$grype_sarif")
          # Trivy SARIF is pre-filtered by .trivy.yaml to HIGH+CRITICAL only.
          trivy_results=$(jq '.runs[0].results | length' trivy-results.sarif)
          total=$((grype_results + trivy_results))
          if [ "$total" -gt 0 ]; then
            echo "::error::Scanners found $grype_results Grype + $trivy_results Trivy HIGH/CRITICAL vulnerabilities"
            exit 1
          fi

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.build-image.outputs.image }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Log in to quay.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: caugello+macmac
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Push To quay.io
        id: push-to-quay
        run: |
          FULL_IMAGE="quay.io/caugello/${{ steps.build-image.outputs.image }}"
          TAGS="${{ steps.build-image.outputs.tags }}"
          for tag in $TAGS; do
            podman push --digestfile /tmp/push-digest \
              "${{ steps.build-image.outputs.image }}:${tag}" "${FULL_IMAGE}:${tag}"
          done
          DIGEST=$(cat /tmp/push-digest)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "registry-paths=${FULL_IMAGE}:${TAGS%% *}" >> "$GITHUB_OUTPUT"

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: quay.io/caugello/${{ matrix.image }}
          subject-digest: ${{ steps.push-to-quay.outputs.digest }}

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: quay.io/caugello/${{ matrix.image }}
          subject-digest: ${{ steps.push-to-quay.outputs.digest }}
          sbom-path: sbom.spdx.json

      - name: Capture base image digests
        id: base-images
        run: |
          # Match any FROM or COPY --from= line that carries an @sha256: digest.
          # Strips the --from= prefix so both FROM and COPY --from contribute entries.
          # Deduplicates by ref (e.g. uv binary appears in multiple stages).
          awk '
            /@sha256:/ {
              for (i = 1; i <= NF; i++) {
                if ($i ~ /@sha256:/) {
                  ref = $i
                  sub(/^--from=/, "", ref)
                  split(ref, a, "@")
                  printf "{\"ref\":\"%s\",\"digest\":\"%s\"}\n", ref, a[2]
                }
              }
            }
          ' "${{ matrix.containerfile }}" | \
          jq -s 'unique_by(.ref) | {baseImages: .}' > base-image-digests.json
          echo "Base image digests captured:"
          jq . base-image-digests.json

      - name: Attest base image digests
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: quay.io/caugello/${{ matrix.image }}
          subject-digest: ${{ steps.push-to-quay.outputs.digest }}
          predicate-type: https://macmac.dev/base-images/v1
          predicate-path: base-image-digests.json

      - name: Sign Container Image
        run: |
          cosign login quay.io \
            -u caugello+macmac \
            -p "$REGISTRY_PASSWORD"
          cosign sign --yes \
            quay.io/caugello/${{ matrix.image }}@${{ steps.push-to-quay.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "1"
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Print image url
        run: echo "Image pushed to ${{ steps.push-to-quay.outputs.registry-paths }}"
