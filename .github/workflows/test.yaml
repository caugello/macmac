name: Test and Lint

on:
  push:
    branches: ["main", "refactor"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra lint

      - name: Run ruff
        run: uv run ruff check services/ tests/

      - name: Run black (check only)
        run: uv run black --check services/ tests/

      - name: Run mypy
        run: uv run mypy services/ --ignore-missing-imports
        continue-on-error: true

  test:
    name: Run Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run unit tests
        run: uv run pytest tests/ -m unit --timeout=30

      - name: Run unit tests with coverage
        if: github.ref == 'refs/heads/main'
        run: uv run pytest tests/ -m unit --cov=services --cov-report=xml --cov-report=term

      - name: Upload coverage to artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: github.ref == 'refs/heads/main'
        with:
          name: coverage-report
          path: |
            coverage.xml
