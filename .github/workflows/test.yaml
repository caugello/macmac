name: Test and Lint

on:
  push:
    branches: ["main", "refactor"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    env:
      UV_INDEX_RHTL_USERNAME: ${{ secrets.UV_INDEX_RHTL_USERNAME }}
      UV_INDEX_RHTL_PASSWORD: ${{ secrets.UV_INDEX_RHTL_PASSWORD }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra lint

      - name: Run ruff
        run: uv run ruff check services/ tests/

      - name: Run ruff format (check only)
        run: uv run ruff format --check services/ tests/

      - name: Run mypy
        run: uv run mypy services/ --ignore-missing-imports
        continue-on-error: true

  test:
    name: Run Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      UV_INDEX_RHTL_USERNAME: ${{ secrets.UV_INDEX_RHTL_USERNAME }}
      UV_INDEX_RHTL_PASSWORD: ${{ secrets.UV_INDEX_RHTL_PASSWORD }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra test

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify RHTL package provenance
        run: python scripts/verify-packages.py .venv/lib/python3.12/site-packages

      - name: Check lock file is up to date
        run: uv lock --check

      - name: Run unit tests
        run: uv run pytest tests/ -m unit --timeout=30

      - name: Run unit tests with coverage
        if: github.ref == 'refs/heads/main'
        run: uv run pytest tests/ -m unit --cov=services --cov-report=xml --cov-report=term

      - name: Upload coverage to artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: github.ref == 'refs/heads/main'
        with:
          name: coverage-report
          path: |
            coverage.xml
