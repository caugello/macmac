# Copy to inventory.ini and fill in your OVH VPS.
# Single-node k3s host. Connect as a sudo-capable NON-root user — the play
# escalates with sudo and disables direct root login + password auth.
#
#   ansible-playbook -i inventory.ini playbook.yml

[k3s_host]
# macmac-k3s ansible_host=203.0.113.10 ansible_user=fedora

[k3s_host:vars]
# SSH connection defaults (override per-host above as needed).
ansible_user=fedora
# ansible_ssh_private_key_file=~/.ssh/id_ed25519
