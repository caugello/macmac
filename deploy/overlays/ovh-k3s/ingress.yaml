---
# ============================================================
# k3s Ingress (#398): replaces the OpenShift Routes for the
# gateway and frontend Services. TLS certificates are issued by
# cert-manager (letsencrypt-prod ClusterIssuer) and served by
# k3s's built-in Traefik ingress controller.
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: macmac
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        # Working domain; revisit when the final product domain is chosen (#404).
        - macmac.augello.be
      secretName: frontend-tls
  rules:
    - host: macmac.augello.be
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway
  namespace: macmac
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        # Working domain; revisit when the final product domain is chosen (#404).
        - api.macmac.augello.be
      secretName: gateway-tls
  rules:
    - host: api.macmac.augello.be
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
