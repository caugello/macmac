apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ============================================================
# k3s overlay (OVH single-node VPS, Fedora 44)
# ============================================================
# Phase 1 of the OpenShift -> k3s migration. This overlay layers
# k3s-specific changes on top of the portable base so the base
# stays reusable for a future OVH Managed K8s migration.
#
# Build / render:
#   kubectl kustomize deploy/overlays/ovh-k3s/
#   kustomize build  deploy/overlays/ovh-k3s/
#
# This issue (#397) is scaffolding only: it wires the overlay to
# the base and earmarks the sections that later Phase-1 issues
# fill in. It performs NO conversions itself.

namespace: macmac

resources:
  - ../../bases/macmac
  # #398 — Ingress objects replacing the gateway/frontend Routes.
  - ingress.yaml

# ------------------------------------------------------------
# Patches earmarked for downstream Phase-1 issues.
# Each later issue drops its patch(es) here (and any new
# resource files it needs), leaving this overlay buildable
# at every step.
# ------------------------------------------------------------
patches:
  # #398 — Route -> Ingress (gateway, frontend): delete the
  #        route.openshift.io/v1 Routes (replaced by the Ingress
  #        objects in ingress.yaml). The rabbitmq-amqps Route is
  #        left in place for #401.
  - patch: |
      $patch: delete
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: gateway
        namespace: macmac
    target:
      group: route.openshift.io
      version: v1
      kind: Route
      name: gateway
  - patch: |
      $patch: delete
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: frontend
        namespace: macmac
    target:
      group: route.openshift.io
      version: v1
      kind: Route
      name: frontend
  #
  # #399 — Resource requests/limits: set requests.cpu,
  #        requests.memory and limits.memory on every container
  #        across all workloads (sizing per migration plan §4 /
  #        issue #399). CPU limits are intentionally omitted —
  #        k3s throttles CPU fairly, while memory limits are hard
  #        (OOMKilled if exceeded). Strategic-merge patches match
  #        containers (and the alembic `migrate` initContainers)
  #        by name. Migrate initContainers are short-lived and get
  #        a modest sizing sufficient for a single alembic run.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: gateway
        namespace: macmac
      spec:
        template:
          spec:
            containers:
              - name: gateway
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    memory: 512Mi
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: frontend
        namespace: macmac
      spec:
        template:
          spec:
            containers:
              - name: frontend
                resources:
                  requests:
                    cpu: 25m
                    memory: 32Mi
                  limits:
                    memory: 64Mi
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: auth-api
        namespace: macmac
      spec:
        template:
          spec:
            initContainers:
              - name: migrate
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    memory: 256Mi
            containers:
              - name: auth-api
                resources:
                  requests:
                    cpu: 75m
                    memory: 192Mi
                  limits:
                    memory: 384Mi
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: catalog-api
        namespace: macmac
      spec:
        template:
          spec:
            initContainers:
              - name: migrate
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    memory: 256Mi
            containers:
              - name: catalog-api
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    memory: 512Mi
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: recipes-api
        namespace: macmac
      spec:
        template:
          spec:
            initContainers:
              - name: migrate
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    memory: 256Mi
            containers:
              - name: recipes-api
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    memory: 512Mi
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: meal-plans-api
        namespace: macmac
      spec:
        template:
          spec:
            initContainers:
              - name: migrate
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    memory: 256Mi
            containers:
              - name: meal-plans-api
                resources:
                  requests:
                    cpu: 75m
                    memory: 192Mi
                  limits:
                    memory: 384Mi
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: redis-cache
        namespace: macmac
      spec:
        template:
          spec:
            containers:
              - name: valkey
                resources:
                  requests:
                    cpu: 25m
                    memory: 64Mi
                  limits:
                    memory: 128Mi
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: rabbitmq
        namespace: macmac
      spec:
        template:
          spec:
            containers:
              - name: rabbitmq
                resources:
                  requests:
                    cpu: 150m
                    memory: 384Mi
                  limits:
                    memory: 768Mi
  - patch: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: auth-db
        namespace: macmac
      spec:
        template:
          spec:
            containers:
              - name: postgres
                resources:
                  requests:
                    cpu: 100m
                    memory: 192Mi
                  limits:
                    memory: 384Mi
  - patch: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: catalog-db
        namespace: macmac
      spec:
        template:
          spec:
            containers:
              - name: postgres
                resources:
                  requests:
                    cpu: 100m
                    memory: 192Mi
                  limits:
                    memory: 384Mi
  - patch: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: recipes-db
        namespace: macmac
      spec:
        template:
          spec:
            containers:
              - name: postgres
                resources:
                  requests:
                    cpu: 100m
                    memory: 192Mi
                  limits:
                    memory: 384Mi
  - patch: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: meal-plans-db
        namespace: macmac
      spec:
        template:
          spec:
            containers:
              - name: postgres
                resources:
                  requests:
                    cpu: 100m
                    memory: 192Mi
                  limits:
                    memory: 384Mi
  - patch: |
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: macmac-crawler
        namespace: macmac
      spec:
        jobTemplate:
          spec:
            template:
              spec:
                containers:
                  - name: crawler
                    resources:
                      requests:
                        cpu: 100m
                        memory: 192Mi
                      limits:
                        memory: 384Mi
  - patch: |
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: macmac-reenrich
        namespace: macmac
      spec:
        jobTemplate:
          spec:
            template:
              spec:
                containers:
                  - name: reenrich
                    resources:
                      requests:
                        cpu: 100m
                        memory: 192Mi
                      limits:
                        memory: 384Mi
  #
  # #400 — local-path storage: set spec.storageClassName:
  #        local-path on the 4 database PVCs.
  #
  - patch: |
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: auth-db-pvc
        namespace: macmac
      spec:
        storageClassName: local-path
  - patch: |
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: catalog-db-pvc
        namespace: macmac
      spec:
        storageClassName: local-path
  - patch: |
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: recipes-db-pvc
        namespace: macmac
      spec:
        storageClassName: local-path
  - patch: |
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: meal-plans-db-pvc
        namespace: macmac
      spec:
        storageClassName: local-path
  #
  # #401 — RabbitMQ amqps: expose 5671 externally for remote
  #        enrichers via hostPort, and drop the OpenShift passthrough
  #        Route. hostPort was chosen over a Traefik TCP entrypoint
  #        because the latter needs a HelmChartConfig in the
  #        kube-system namespace, which collides with this overlay's
  #        `namespace: macmac` transformer. On single-node k3s,
  #        hostPort binds amqps directly on the node and preserves
  #        end-to-end TLS (TLS terminates at the rabbitmq pod, not in
  #        any proxy). The ClusterIP Service is left intact so
  #        in-cluster clients keep using it.
  #
  # Delete the OpenShift Route (replaced by the hostPort binding).
  - patch: |
      $patch: delete
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: rabbitmq-amqps
        namespace: macmac
    target:
      group: route.openshift.io
      version: v1
      kind: Route
      name: rabbitmq-amqps
  # Bind the amqps containerPort (5671) to hostPort 5671 on the node.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: rabbitmq
        namespace: macmac
      spec:
        template:
          spec:
            containers:
              - name: rabbitmq
                ports:
                  - containerPort: 5671
                    hostPort: 5671
  #
  # #405 — Secrets management (manual now, SOPS later): the base ships
  #        the data-store Secrets with CHANGE_ME placeholders so the
  #        portable manifest stays complete. On this cluster those
  #        Secrets are created out-of-band with real generated values
  #        (see the "Secrets" section in README.md). Delete the placeholders from the
  #        overlay so `apply -k` never clobbers the live values.
  #        rabbitmq-definitions is left in place (it is a non-functional
  #        stub for future remote enrichers, not a live credential).
  #        macmac-app-secret and rabbitmq-tls are not defined in the
  #        base — only referenced — so they need no delete patch.
  - patch: |
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata:
        name: recipes-db-secret
        namespace: macmac
  - patch: |
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata:
        name: catalog-db-secret
        namespace: macmac
  - patch: |
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata:
        name: auth-db-secret
        namespace: macmac
  - patch: |
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata:
        name: meal-plans-db-secret
        namespace: macmac
  - patch: |
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata:
        name: redis-secret
        namespace: macmac
