---
# ============================================================
# Gateway
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: macmac
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      imagePullSecrets:
        - name: macmac-pull-secret
      volumes:
        - name: cfg
          configMap:
            name: macmac-config
      containers:
        - name: gateway
          image: quay.io/caugello/macmac-gateway:v0.2.6
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: cfg
              mountPath: /app/config.yaml
              subPath: config.yaml
          env:
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: macmac-app-secret
                  key: JWT_SECRET_KEY
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
          command:
            - gunicorn
            - services.gateway.main:app
            - --workers=4
            - --worker-class=services.gateway.worker.GatewayUvicornWorker
            - --bind=0.0.0.0:8080
            - --access-logfile=-
            - --error-logfile=-
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: macmac
  labels:
    app: gateway
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: gateway
  namespace: macmac
spec:
  to:
    kind: Service
    name: gateway
  port:
    targetPort: http
  tls:
    termination: edge
