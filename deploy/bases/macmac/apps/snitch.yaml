---
# ============================================================
# Snitch — central enrichment-results consumer (no Service)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: snitch
  namespace: macmac
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snitch
  template:
    metadata:
      labels:
        app: snitch
    spec:
      imagePullSecrets:
        - name: macmac-pull-secret
      volumes:
        - name: cfg
          configMap:
            name: macmac-config
      containers:
        - name: snitch
          image: quay.io/caugello/macmac-snitch:v0.2.6
          imagePullPolicy: Always
          volumeMounts:
            - name: cfg
              mountPath: /app/config.yaml
              subPath: config.yaml
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: catalog-db-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catalog-db-secret
                  key: DB_PASSWORD
            - name: CATALOG_DATABASE_URL
              value: "postgresql+pg8000://$(DB_USER):$(DB_PASSWORD)@catalog-db:5432/catalog"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: macmac-app-secret
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: macmac-app-secret
                  key: RABBITMQ_PASSWORD
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@rabbitmq:5672/%2F"
          command:
            - python
            - -m
            - services.catalog.snitch.main
