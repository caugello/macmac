---
# ============================================================
# Auth API
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-api
  namespace: macmac
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-api
  template:
    metadata:
      labels:
        app: auth-api
    spec:
      imagePullSecrets:
        - name: macmac-pull-secret
      volumes:
        - name: cfg
          configMap:
            name: macmac-config
        - name: firebase-credentials
          secret:
            secretName: macmac-firebase-credentials
      initContainers:
        - name: migrate
          image: quay.io/caugello/macmac-auth:v0.2.12
          imagePullPolicy: Always
          volumeMounts:
            - name: cfg
              mountPath: /app/config.yaml
              subPath: config.yaml
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: DB_PASSWORD
            - name: AUTH_DATABASE_URL
              value: "postgresql+pg8000://$(DB_USER):$(DB_PASSWORD)@auth-db:5432/auth"
          command:
            - python
            - -c
            - |
              import socket, time, subprocess, sys
              while True:
                  try:
                      socket.create_connection(("auth-db", 5432), timeout=2)
                      break
                  except OSError:
                      time.sleep(2)
              sys.exit(subprocess.call([sys.executable, "-m", "alembic", "-c", "services/auth/alembic.ini", "upgrade", "head"]))
      containers:
        - name: auth-api
          image: quay.io/caugello/macmac-auth:v0.2.12
          imagePullPolicy: Always
          ports:
            - containerPort: 8004
          volumeMounts:
            - name: cfg
              mountPath: /app/config.yaml
              subPath: config.yaml
            - name: firebase-credentials
              mountPath: /opt/app-root/src/credentials
              readOnly: true
          env:
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: macmac-app-secret
                  key: JWT_SECRET_KEY
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /opt/app-root/src/credentials/google-credentials.json
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: DB_PASSWORD
            - name: AUTH_DATABASE_URL
              value: "postgresql+pg8000://$(DB_USER):$(DB_PASSWORD)@auth-db:5432/auth"
          command:
            - gunicorn
            - services.auth.main:app
            - --workers=4
            - --worker-class=uvicorn.workers.UvicornWorker
            - --bind=0.0.0.0:8004
            - --access-logfile=-
            - --error-logfile=-
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8004
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-api
  namespace: macmac
  labels:
    app: auth-api
spec:
  selector:
    app: auth-api
  ports:
    - name: http
      port: 8004
      targetPort: 8004
