---
# ============================================================
# Recipes API
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recipes-api
  namespace: macmac
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recipes-api
  template:
    metadata:
      labels:
        app: recipes-api
    spec:
      imagePullSecrets:
        - name: macmac-pull-secret
      volumes:
        - name: cfg
          configMap:
            name: macmac-config
      initContainers:
        - name: migrate
          image: quay.io/caugello/macmac-recipes:v0.2.12
          imagePullPolicy: Always
          volumeMounts:
            - name: cfg
              mountPath: /app/config.yaml
              subPath: config.yaml
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: recipes-db-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: recipes-db-secret
                  key: DB_PASSWORD
            - name: RECIPES_DATABASE_URL
              value: "postgresql+pg8000://$(DB_USER):$(DB_PASSWORD)@recipes-db:5432/recipes"
          command:
            - python
            - -c
            - |
              import socket, time, subprocess, sys
              while True:
                  try:
                      socket.create_connection(("recipes-db", 5432), timeout=2)
                      break
                  except OSError:
                      time.sleep(2)
              sys.exit(subprocess.call([sys.executable, "-m", "alembic", "-c", "services/recipes/alembic.ini", "upgrade", "head"]))
      containers:
        - name: recipes-api
          image: quay.io/caugello/macmac-recipes:v0.2.12
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          volumeMounts:
            - name: cfg
              mountPath: /app/config.yaml
              subPath: config.yaml
          env:
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: macmac-app-secret
                  key: JWT_SECRET_KEY
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: recipes-db-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: recipes-db-secret
                  key: DB_PASSWORD
            - name: RECIPES_DATABASE_URL
              value: "postgresql+pg8000://$(DB_USER):$(DB_PASSWORD)@recipes-db:5432/recipes"
          command:
            - gunicorn
            - services.recipes.main:app
            - --workers=4
            - --worker-class=uvicorn.workers.UvicornWorker
            - --bind=0.0.0.0:8001
            - --access-logfile=-
            - --error-logfile=-
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: recipes-api
  namespace: macmac
  labels:
    app: recipes-api
spec:
  selector:
    app: recipes-api
  ports:
    - name: http
      port: 8001
      targetPort: 8001
