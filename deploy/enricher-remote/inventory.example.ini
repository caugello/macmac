# Copy to inventory.ini and fill in your VPS hosts.
# Each host runs one interchangeable competing-consumer enricher worker.
#
#   ansible-playbook -i inventory.ini playbook.yml

[enricher_workers]
# vps-eu-1 ansible_host=203.0.113.10 ansible_user=fedora
# vps-us-1 ansible_host=198.51.100.20 ansible_user=fedora

[enricher_workers:vars]
# SSH connection defaults (override per-host above as needed).
ansible_user=fedora
# ansible_ssh_private_key_file=~/.ssh/id_ed25519
