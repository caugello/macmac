---
# Provision a plain VPS to run the MacMac enricher as a podman + systemd
# (quadlet) service. Idempotent: deploy and version-bump are the same run —
# change `enricher_image_tag` in group_vars and re-run.
#
#   ansible-playbook -i inventory.ini playbook.yml
#   ansible-playbook -i inventory.ini playbook.yml --check   # dry-run
#
# The worker is DB-free: it consumes RabbitMQ over amqps and publishes results
# back. No Postgres env is set anywhere in this playbook.
- name: Deploy remote enricher worker (podman + systemd quadlet)
  hosts: enricher_workers
  become: true
  become_method: ansible.builtin.sudo

  vars:
    # Quadlet system unit path. systemd-generator picks unit files up from here.
    enricher_quadlet_path: /etc/containers/systemd/enricher.container
    # Directory holding the files mounted read-only into the container.
    enricher_conf_dir: /etc/macmac-enricher
    enricher_env_path: "{{ enricher_conf_dir }}/enricher.env"
    enricher_config_path: "{{ enricher_conf_dir }}/config.yaml"
    enricher_ca_cert_path: "{{ enricher_conf_dir }}/rabbitmq-ca.crt"
    # Resolve the repo config.yaml relative to this playbook (repo root is two
    # levels up from deploy/enricher-remote/).
    repo_config_yaml: "{{ playbook_dir }}/../../config.yaml"

  tasks:
    - name: Ensure podman is installed
      ansible.builtin.package:
        name: podman
        state: present
        update_cache: true

    - name: Ensure config directory exists
      ansible.builtin.file:
        path: "{{ enricher_conf_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Log in to the container registry (optional, private image)
      containers.podman.podman_login:
        registry: "{{ enricher_registry }}"
        username: "{{ registry_username }}"
        password: "{{ registry_password }}"
      when:
        - registry_username | default('') | length > 0
        - registry_password | default('') | length > 0
      no_log: true

    - name: Deploy RabbitMQ TLS CA certificate
      ansible.builtin.copy:
        content: "{{ rabbitmq_ca_cert }}"
        dest: "{{ enricher_ca_cert_path }}"
        owner: root
        group: root
        mode: "0644"
      notify: Restart enricher

    - name: Ship repo config.yaml to the host (mounted read-only into container)
      ansible.builtin.copy:
        src: "{{ repo_config_yaml }}"
        dest: "{{ enricher_config_path }}"
        owner: root
        group: root
        mode: "0644"
      notify: Restart enricher

    - name: Render enricher .env (secrets from vars/vault)
      ansible.builtin.template:
        src: enricher.env.j2
        dest: "{{ enricher_env_path }}"
        owner: root
        group: root
        mode: "0600"
      no_log: true
      notify: Restart enricher

    - name: Render enricher quadlet .container unit
      ansible.builtin.template:
        src: enricher.container.j2
        dest: "{{ enricher_quadlet_path }}"
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd
        - Restart enricher

    - name: Start the enricher service (boot-enable via quadlet [Install])
      ansible.builtin.systemd_service:
        name: enricher.service
        state: started
        daemon_reload: true

  handlers:
    # Quadlet units are generated by systemd at daemon-reload time, so a unit
    # change requires a reload before the new image/args take effect.
    - name: Reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true

    # Triggered when the unit, env, config, or CA cert change. The unit pulls
    # the pinned image (Pull=newer) on (re)start, so a bumped
    # `enricher_image_tag` re-renders the unit -> reload -> restart, new image.
    - name: Restart enricher
      ansible.builtin.systemd_service:
        name: enricher.service
        state: restarted
        daemon_reload: true

# ----------------------------------------------------------------------------
# Host hardening. The enricher is a DB-free competing-consumer that only dials
# OUT (amqps to the broker + https to OpenAI/vendor sites), so it needs ZERO
# inbound except SSH. Cloud images ship with no firewall and password SSH auth
# on, so harden: firewalld (deny inbound except SSH), key-only SSH, fail2ban on
# the SSH jail, and unattended security updates. Idempotent — safe to re-run.
- name: Harden the enricher host
  hosts: enricher_workers
  become: true
  become_method: ansible.builtin.sudo

  tasks:
    # --- firewalld: default-deny inbound, allow only SSH ---
    - name: Ensure firewalld is installed
      ansible.builtin.package:
        name: firewalld
        state: present

    - name: Ensure firewalld is enabled and running
      ansible.builtin.systemd_service:
        name: firewalld
        enabled: true
        state: started

    # Allow SSH BEFORE any reload so we can never lock ourselves out. The
    # default public zone already permits ssh, so starting firewalld above is
    # also safe. firewall-cmd is idempotent: a no-op prints ALREADY_ENABLED.
    - name: Allow SSH through firewalld (permanent)
      ansible.builtin.command: firewall-cmd --permanent --add-service=ssh
      register: fw_ssh
      changed_when: "'ALREADY_ENABLED' not in fw_ssh.stderr"
      notify: Reload firewalld

    # Drop services the image pre-opened that the enricher does not need
    # (web admin, multicast DNS). dhcpv6-client is left for IPv6 networking.
    - name: Remove unneeded services from firewalld (permanent, best-effort)
      ansible.builtin.command: firewall-cmd --permanent --remove-service={{ item }}
      loop:
        - cockpit
        - mdns
      register: fw_svc
      changed_when: "'NOT_ENABLED' not in fw_svc.stderr"
      failed_when: false
      notify: Reload firewalld

    # --- SSH: key-only, no root login, fewer auth tries ---
    # 10- prefix loads before cloud-init's 50-cloud-init.conf (which sets
    # PasswordAuthentication yes); sshd uses the first value seen, so ours wins.
    - name: Harden sshd (key-only, no root, no X11)
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/10-macmac-hardening.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by the MacMac enricher playbook — do not edit by hand.
          PasswordAuthentication no
          KbdInteractiveAuthentication no
          PermitRootLogin no
          X11Forwarding no
          MaxAuthTries 3
        validate: /usr/sbin/sshd -t -f %s
      notify: Reload sshd

    # --- fail2ban: ban brute-force SSH sources via firewalld ---
    - name: Ensure fail2ban is installed (firewalld backend)
      ansible.builtin.package:
        name:
          - fail2ban
          - fail2ban-firewalld
        state: present

    - name: Configure fail2ban SSH jail
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.d/00-macmac.local
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by the MacMac enricher playbook — do not edit by hand.
          [DEFAULT]
          backend  = systemd
          bantime  = 1h
          findtime = 10m
          maxretry = 5

          [sshd]
          enabled = true
      notify: Restart fail2ban

    - name: Ensure fail2ban is enabled and running
      ansible.builtin.systemd_service:
        name: fail2ban
        enabled: true
        state: started

    # --- unattended security updates ---
    - name: Ensure dnf-automatic is installed
      ansible.builtin.package:
        name: dnf-automatic
        state: present

    # dnf5 (Fedora 44) reads defaults from
    # /usr/share/dnf5/dnf5-plugins/automatic.conf and merges host overrides
    # from /etc/dnf/automatic.conf (which the package does not ship). A minimal
    # override that enables security-only auto-apply is all we need.
    - name: Apply security updates automatically
      ansible.builtin.copy:
        dest: /etc/dnf/automatic.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by the MacMac enricher playbook — overrides merged over
          # /usr/share/dnf5/dnf5-plugins/automatic.conf defaults.
          [commands]
          upgrade_type = security
          apply_updates = yes

    - name: Enable the dnf-automatic timer
      ansible.builtin.systemd_service:
        name: dnf5-automatic.timer
        enabled: true
        state: started

  handlers:
    - name: Reload firewalld
      ansible.builtin.command: firewall-cmd --reload
      changed_when: true

    - name: Reload sshd
      ansible.builtin.systemd_service:
        name: sshd
        state: reloaded

    - name: Restart fail2ban
      ansible.builtin.systemd_service:
        name: fail2ban
        state: restarted
